name: Bug Report
description: Report a reproducible Caff problem.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Open Caff
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "14.5"
    validations:
      required: true
  - type: input
    id: caff
    attributes:
      label: Caff Version
      placeholder: "0.1.3"
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant `caff status` output, logs, or screenshots.
